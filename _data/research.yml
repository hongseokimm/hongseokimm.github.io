- title: Precautionary Retirement
  status: Job Market Paper
  summary: How do Social Security financing risk and regressive payroll taxes reshape labor supply and retirement timing across income groups?
  abstract: With Social Security's trust fund facing depletion, this paper studies how the system's regressive payroll tax shapes labor supply and retirement decisions, motivated by the fact that high-income older men work more and longer. I develop a tractable labor supply model with heterogeneous work costs to show that the elasticity of labor supply to financial incentives is inherently distributional. High-income workers, who are further from their retirement cutoff, primarily adjust hours on the intensive margin, while workers with higher work costs adjust participation on the extensive margin. The paper measures these income-specific elasticities and uses them to evaluate the distributional effects of payroll-tax reforms for Social Security solvency.
