- title: Ambiguity Aversion and Fertility Decisions
  status: Working Paper
  summary: A macro-family economics framework for fertility choices when the returns to parenthood are ambiguous rather than simply risky.
  abstract: This paper investigates how ambiguity aversion affects fertility decisions when households are uncertain about the benefits of parenthood. I extend the Becker and Barro fertility model by incorporating ambiguity aversion and dynastic altruism, allowing individuals to evaluate fertility choices under worst-case beliefs about their children's future outcomes. The framework helps explain declining fertility and rising childlessness in developed economies as parents place more weight on downside scenarios when returns to parenthood are difficult to quantify.
